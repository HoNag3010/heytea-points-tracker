<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HEYTEA Points Tracker</title>
    <meta
      name="description"
      content="Track HEYTEA points, calculate expiration dates, and see which balances expire next."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="tracker">
        <div class="tracker__header">
          <div>
            <p class="eyebrow">HEYTEA points</p>
            <h1>Expiration tracker</h1>
          </div>
          <button class="icon-button" id="clearAllButton" type="button" aria-label="Clear all entries" title="Clear all">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <section class="summary" aria-label="Points summary">
          <div>
            <span class="summary__label">Available</span>
            <strong id="availablePoints">0</strong>
          </div>
          <div>
            <span class="summary__label">Expiring next</span>
            <strong id="nextExpiration">None</strong>
          </div>
          <div>
            <span class="summary__label">Expired</span>
            <strong id="expiredPoints">0</strong>
          </div>
        </section>

        <form class="entry-form" id="entryForm">
          <div class="segmented-control" role="radiogroup" aria-label="Entry type">
            <label>
              <input type="radio" name="kind" value="earned" checked>
              <span>Earned</span>
            </label>
            <label>
              <input type="radio" name="kind" value="used">
              <span>Used</span>
            </label>
          </div>

          <label class="field">
            <span>Date</span>
            <input id="entryDate" name="date" type="date" required>
          </label>

          <label class="field">
            <span>Points</span>
            <input id="entryPoints" name="points" type="number" min="1" step="1" inputmode="numeric" required>
          </label>

          <label class="field field--wide">
            <span>Note</span>
            <input id="entryNote" name="note" type="text" maxlength="60" placeholder="Milk tea, promo, order">
          </label>

          <button class="primary-button" type="submit">Add entry</button>
        </form>

        <section class="expiration-list" aria-labelledby="balancesTitle">
          <div class="section-heading">
            <h2 id="balancesTitle">Current balances</h2>
            <span id="balanceCount">0 lots</span>
          </div>
          <div id="balancesList" class="rows" aria-live="polite"></div>
        </section>
      </section>

      <aside class="activity-panel" aria-labelledby="activityTitle">
        <div class="section-heading">
          <h2 id="activityTitle">Activity</h2>
          <button class="text-button" id="sampleButton" type="button">Load sample</button>
        </div>
        <div id="activityList" class="activity-list"></div>
      </aside>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <h3>No entries yet</h3>
        <p>Add earned points to start tracking expiration dates.</p>
      </div>
    </template>

    <script src="script.js"></script>
  </body>
</html>
